/* ================= LEFT PTZ SIDEBAR ================= */

.ptz-sidebar{

width:300px;
background: #040a27;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
border-left:10px solid  #182386;
border-right:10px solid #182386;
border-radius:15px;
transition:.3s;
overflow:auto;
margin-top: 1px;
margin:auto;
position:relative;
outline: none; 
 
 /* margin-bottom: 10px; 
 margin:auto; */
   /* position:relative;
  align-items: center;
  justify-content: center;
   align-items: center; 
  justify-content: center;
  */

 
}

/* collapse button */

.toggle-btn{

position:absolute;
left:280px;
top:70px;
background:#2563eb;
border:none;
color:white;
padding:6px 10px;
cursor:pointer;
border-radius:6px;

}

/* ================= VIDEO AREA ================= */


.video-area{
width:100%;
order:1;
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;

}


.video-panel{
  
width:100%; 
max-width: 3840px ; /* 🔥 1900px;  3840px;   allow full 4K  900px;  1500px; */
height: auto;
background: black;
aspect-ratio:16/9;
background:black;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

video{
width:100%;
height:100%;
object-fit:contain;
display: block;
}

/* ================= PTZ JOYSTICK ================= */

.section-title{
font-size:20px;
color:#94a3b8;
margin-bottom:8px;
}

/* joystick */

.joystick{
width:170px;
height:160px;
margin:auto;
position:relative;
}

.joystick button{
position:absolute;
width:50px;
height:50px;
border-radius:50%;
border:none;
background:#1e293b;
color:white;
font-size:18px;
cursor:pointer;
}

.joystick button:active{
background:#2563eb;
}

/* directions */

.up{top:0;left:60px;}
.down{bottom:0;left:60px;}
.left{left:0;top:60px;}
.right{right:0;top:60px;}

.upleft{top:5px;left:5px;}
.upright{top:5px;right:5px;}
.downleft{bottom:5px;left:5px;}
.downright{bottom:5px;right:5px;}

.center{
top:60px;
left:60px;
background:#2563eb;
}

/* ================= ZOOM CONTROL ================= */

.zoom-box{
display:flex;
flex-direction:column;
gap:10px;
}

.zoom-buttons{
display:flex;
gap:8px;
}

.zoom-buttons button{
flex:1;
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

#digitalZoom{
width:100%;
}

/* ================= PRESET KEYPAD ================= */

.preset-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.preset-grid button{
height:60px;
font-size:20px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
cursor:pointer;
}

.preset-grid button:active{
background:#16a34a;
}

.preset-control input{
width:100%;
padding:8px;
border-radius:6px;
margin-bottom:10px;
font-size:16px;
}


/* ===== INFO BAR ===== */
.info-bar {
  margin-top: 12px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #020617;
  color: white;
  border-radius: 8px;
  font-size: 18px;
}

.information_area{
 height:100px;
/* width:500px;
  position:relative; */
  position:relative;
  margin:auto;
  align-items: center;
  justify-content: center;
  border-radius:100px;
  background: #040a27;
  gap: 100px;
  border-radius: 50px;
  margin-top: 20px;
  margin-bottom: 10px;
  padding: 10px;
  display: flex;
  outline: none;
  font-size: 15px;
  color: rgb(243, 240, 240);
}

/* ===== FILENAME INPUT ===== */
.filename-box{

  width:500px;
  margin-top: 10px;
  margin:auto;
  display: flex;
  flex-direction: column;
  color: rgb(243, 240, 240);
}

.filename-box label {
  font-weight: 600;
}

.filename-box input {

  padding: 15px;
  font-size: 15px;
  border-radius: 6px;
  border: 1px solid #cbd5f5;
  outline: none;

}

/* ===== CONTROLS ===== */
.controls {

  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.controls button {

  margin-top: 20px;
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: rgb(243, 240, 240);
}

.controls button:disabled{
  opacity: 0.4;
  cursor: not-allowed;
}

.primary{
  background: #22c55e;
  color: white;
}

.danger{
  background: #ef4444;
  color: white;
}


/* ================= RESPONSIVE ================= */

@media(max-width:900px){

.ptz-sidebar{
position:absolute;
z-index:5;
height:100%;
}

.toggle-btn{
left:10px;
}

}

</style>

<nav class="navbar">
  <div >📷 CAMERA SYSTEM CONTROL</div>
  <ul>
    <li class="active">HOME</li>

<div class="layout">

<!-- ================= PTZ SIDEBAR ================= -->

<div class="ptz-sidebar" id="sidebar">



<div class="section-title">PTZ JOYSTICK</div>
<div class="zoom-speed"> 
<div class="section-title">PAN SPEED</div>
<input id="panSpeed" type="range" min="1" max="24" value="10">
<span id="panSpeedVal">10</span>
</div>

<div class="section-title">TILT SPEED</div>
<div class="zoom-speed"> 
<input id="tiltSpeed" type="range" min="1" max="20" value="10">
<span id="tiltSpeedVal">10</span>
</div>


<div class="joystick">
<button class="upleft"    data-dir="leftup">↖</button>
<button class="up"        data-dir="up">↑</button>
<button class="upright"   data-dir="rightup">↗</button>

<button class="left"      data-dir="left" >←</button>
<button class="center"    data-dir="home" >home</button>
<button class="right"     data-dir="right">→</button>

<button class="downleft"  data-dir="leftdown">↙</button>
<button class="down"      data-dir="down">↓</button>
<button class="downright" data-dir="rightdown">↘</button>
</div>


<div class="zoom-box"> 
  
<div class="section-title">OPTICAL SPEED</div>
<div class="zoom-speed">
<input id="opticalZoomspeed" type="range" min="1" max="7" value="2">
<span id="opticalZoomspeedVal">2</span>
</div>

<div class="section-title">OPTICAL ZOOM</div>
<div class="zoom-buttons">
<button id="opticalzoomIn">+IN</button>
<!-- <button id="opticalzoomStop">■</button> -->
<button id="opticalzoomOut">−</button>
</div>

<label><input id="FOCUSAuto" type="checkbox">FOCUS MANUAL</label>

<div class="section-title">FOCUS SPEED</div>
<div class="zoom-speed">
<input id="FOCUSspeed" type="range" min="1" max="7" value="2">
<span id="FOCUSspeedVal">2</span>
</div>


<div class="section-title">FOCUS CTL</div>
<div class="zoom-buttons">
<button id="FOCUSIn">+NEAR</button>
<!-- <button id="FOCUSStop">■</button> -->
<button id="FOCUSOut">−FAR</button>
</div>

<div class="section-title">DIGITAL ZOOM</div>
<div class="zoom-speed">
<input id="digitalZoom" type="range" min="1" max="7" step="0.2" value="0">
<span  id="digitalZoomVal">1</span>
</div>


</div>

<div class="image-controls">
<div class="section-title">IMAGE CONTROL</div>

<label>Brightness</label>
<input id="brightness" type="range" min="0" max="14" value="7">
<span id="brightnessVal">7</span>
<label>Contrast</label>
<input id="contrast" type="range" min="0" max="14" value="7">
<span id="contrastVal">7</span>
<label>Saturation</label>
<input id="saturation" type="range" min="0" max="14" value="7">
<span id="saturationVal">7</span>
<label>Sharpness</label>
<input id="sharpness" type="range" min="0" max="14" value="6">
<span id="sharpnessVal">6</span>
<label>Hue</label>
<input id="hue" type="range" min="0" max="14" value="7">
<span id="hueVal">7</span>

<button id="IMG_DEFAULT">IMG DEFAULT</button>
<!-- <button id="backlight" class="backlight-btn">Backlight</button> -->

</div>


<div class="section-title">PRESET CONTROL</div>

<div class="preset-control">
<label>Preset Number</label>
<input id="presetNumber" type="number" min="1" max="254" value="1"/>

<div class="zoom-buttons">
    <button id="presetSetBtn">SET</button>
    <!-- <button id="presetCallBtn">CALL</button> -->
</div>
<span id="presetStatus"></span>

</div>
<div class="preset-grid">
<button data-preset="1">1</button>
<button data-preset="2">2</button>
<button data-preset="3">3</button>
<button data-preset="4">4</button>
<button data-preset="5">5</button>
<button data-preset="6">6</button>
<button data-preset="7">7</button>
<button data-preset="8">8</button>
<button data-preset="9">9</button>
</div>

</div>

<!-- ================= VIDEO ================= -->

<div class="video-area">

<div class="video-panel">
<video id="liveFeed" autoplay muted playsinline></video>
</div>

<div class="information_area">

  <div class="info-bar">
    <span class="label">STATUS</span>
    <span id="status" class="badge idle">IDLE</span>
    <span class="pipe">|</span>
    <span class="label">ELAPSED</span>
    <span id="timer">00:00:00</span>
  </div>


   <div class="filename-box">
    <label class="label">FILE NAME</label>
    <input id="filename" placeholder="ENTER FILE NAME" autocomplete="off">
   </div>

 <div class="controls">
  <button id="startBtn"  type="button" class="primary">▶ START</button>
  <button id="pauseBtn"  type="button" disabled>⏸ PAUSE</button>
  <button id="resumeBtn" type="button" disabled>▶ RESUME</button>
  <button id="stopBtn"   type="button" class="danger" disabled>■ STOP</button>
  </div>

  </div>

  </div>

</div>

<button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()" title="Toggle sidebar">❮</button>

<script>
  function toggleSidebar() {
    const sb  = document.getElementById('sidebar');
    const btn = document.getElementById('toggleBtn');
    const open = !sb.classList.contains('collapsed');
    sb.classList.toggle('collapsed', open);
    btn.textContent = open ? '❯' : '❮';
    const w = open ? 0 : parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
    btn.style.left = w + 'px';
  }

  (function(){
    const w = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'));
    document.getElementById('toggleBtn').style.left = w + 'px';
  })();
