<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PTZ Camera System</title>
  <!-- <link rel="stylesheet" href="css/unified-style.css"> -->
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      animation: reveal 0.5s ease;
    }

    .login-card {
      background: var(--panel-grad);
      border: 2px solid var(--b-dark);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--amber), var(--amber-light), var(--amber), transparent);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: radial-gradient(circle at 35% 35%, #3d444c, #0e1012);
      border: 3px solid var(--amber-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.08), 0 4px 16px rgba(0,0,0,0.8), var(--amber-glow);
      animation: logo-pulse 3s ease-in-out infinite;
    }

    .login-title {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-bright);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--amber);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-dim);
      pointer-events: none;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: linear-gradient(180deg, #0e1012, #141618);
      border: 2px solid var(--b-lite);
      border-radius: var(--r);
      color: var(--text-bright);
      font-size: 14px;
      font-family: 'Share Tech Mono', monospace;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
    }

    .login-input:focus {
      outline: none;
      border-color: var(--amber-dark);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 0 0 3px rgba(240,165,0,0.15);
    }

    .login-input::placeholder {
      color: var(--text-dim);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--amber);
    }

    .remember-row label {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--text-mid);
      cursor: pointer;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--amber-dark), var(--amber));
      border: 2px solid var(--amber);
      border-radius: var(--r);
      color: #000;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(240,165,0,0.3);
    }

    .login-btn:hover {
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240,165,0,0.5), var(--amber-glow);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .error-message {
      padding: 12px 16px;
      background: var(--red-dim);
      border: 2px solid var(--red);
      border-radius: var(--r);
      color: var(--red);
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      text-align: center;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .error-message.show {
      display: block;
    }

    .login-footer {
      margin-top: 30px;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Security indicator */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 8px;
      background: rgba(76,175,80,0.05);
      border: 1px solid rgba(76,175,80,0.3);
      border-radius: var(--r);
      font-family: 'Oswald', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--green);
    }

    .security-badge::before {
      content: '🔒';
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }

      .login-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">📷</div>
        <h1 class="login-title">Camera Control</h1>
        <p class="login-subtitle">Industrial System Access</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage">
        Invalid credentials. Please try again.
      </div>

      <!-- Login Form -->
      <form class="login-form" id="loginForm">
        
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            class="login-input" 
            id="username" 
            placeholder="Username" 
            autocomplete="username"
            required
          >
        </div>

        <div class="input-group">
          <span class="input-icon">🔑</span>
          <input 
            type="password" 
            class="login-input" 
            id="password" 
            placeholder="Password" 
            autocomplete="current-password"
            required
          >
        </div>

        <div class="remember-row">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">REMEMBER ME</label>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          ▶ Sign In
        </button>

      </form>

      <!-- Security Badge -->
      <div class="security-badge">
        SECURE CONNECTION ACTIVE
      </div>

      <!-- Footer -->
      <div class="login-footer">
        PTZ CAMERA SYSTEM v3.1 © 2026<br>
        INDUSTRIAL AUTOMATION SOLUTIONS
      </div>

    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberMe = document.getElementById('rememberMe');

    // Simple authentication (no tokens, just session)
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      // Disable button during login
      loginBtn.disabled = true;
      loginBtn.textContent = '⏳ Authenticating...';
      errorMessage.classList.remove('show');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username,
            password,
            remember: rememberMe.checked
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Store login state
          sessionStorage.setItem('isAuthenticated', 'true');
          if (rememberMe.checked) {
            localStorage.setItem('isAuthenticated', 'true');
          }

          // Success - redirect
          loginBtn.textContent = '✓ Success!';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 500);
        } else {
          // Failed
          throw new Error(data.error || 'Authentication failed');
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMessage.textContent = error.message || 'Login failed. Please try again.';
        errorMessage.classList.add('show');
        
        loginBtn.disabled = false;
        loginBtn.textContent = '▶ Sign In';
        
        // Shake animation
        loginForm.style.animation = 'none';
        setTimeout(() => {
          loginForm.style.animation = 'shake 0.5s';
        }, 10);
      }
    });

    // Check if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const isAuthenticated = sessionStorage.getItem('isAuthenticated') || 
                             localStorage.getItem('isAuthenticated');
      
      if (isAuthenticated === 'true') {
        window.location.href = 'index.html';
      }
    });

    // Shake animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
    `;
    document.head.appendChild(style);
  </script>

</body>
</html>
